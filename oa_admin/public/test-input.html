<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>输入框测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .test-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 400px;
    }
    h2 { margin-top: 0; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      height: 44px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 15px;
      margin-bottom: 20px;
      box-sizing: border-box;
    }
    input:focus {
      border-color: #6358ee;
      outline: none;
      box-shadow: 0 0 0 3px rgba(99,88,238,0.15);
    }
    button {
      width: 100%;
      height: 44px;
      background: #6358ee;
      color: white;
      border: none;
      border-radius: 22px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .info { margin-top: 16px; font-size: 13px; color: #666; }
  </style>
</head>
<body>
  <div class="test-box">
    <h2>输入框焦点测试</h2>
    <p>请尝试点击下方输入框，看是否能正常获取焦点：</p>

    <label>测试输入 1</label>
    <input type="text" id="test1" placeholder="点击这里试试">

    <label>测试输入 2</label>
    <input type="text" id="test2" placeholder="点击这里试试">

    <label>测试输入 3</label>
    <input type="password" id="test3" placeholder="密码框">

    <button onclick="alert('输入1: ' + document.getElementById('test1').value + '\n输入2: ' + document.getElementById('test2').value)">测试读取值</button>

    <div class="info">
      <p>如果这些输入框也无法点击，说明是浏览器或系统问题。</p>
      <p>如果这些输入框可以正常点击，说明是 Vue 登录页面的问题。</p>
    </div>
  </div>
</body>
</html>
