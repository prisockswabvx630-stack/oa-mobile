# ============================================
# OA 系统 - CI/CD 流水线
# 触发条件: push/PR 到 main/master 分支
# ============================================

name: OA CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "22"

jobs:
  # ============================================
  # 阶段 1: 代码质量检查（并行）
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [oa_server, oa_admin, oa_domes]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: ${{ matrix.project }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        working-directory: ${{ matrix.project }}
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: "0"

      - name: Generate Prisma Client (oa_server only)
        if: matrix.project == 'oa_server'
        run: npx prisma generate
        working-directory: ${{ matrix.project }}

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: ${{ matrix.project }}
        continue-on-error: true # 允许类型检查警告，不阻塞流程

  # ============================================
  # 阶段 2: 构建测试（lint 通过后并行）
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        project: [oa_server, oa_admin, oa_domes]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: ${{ matrix.project }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        working-directory: ${{ matrix.project }}
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: "0"

      - name: Generate Prisma Client (oa_server only)
        if: matrix.project == 'oa_server'
        run: npx prisma generate
        working-directory: ${{ matrix.project }}

      - name: Build (oa_server)
        if: matrix.project == 'oa_server'
        run: npx tsc
        working-directory: ${{ matrix.project }}

      - name: Build (oa_admin)
        if: matrix.project == 'oa_admin'
        run: pnpm build
        working-directory: ${{ matrix.project }}

      - name: Build web (oa_domes)
        if: matrix.project == 'oa_domes'
        run: npx expo export --platform web
        working-directory: ${{ matrix.project }}

  # ============================================
  # 阶段 3: Docker 镜像构建 & 推送
  # ============================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    # 仅在 push 到 main/master 时构建镜像
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    strategy:
      matrix:
        image:
          - context: oa_server
            name: oa-server
          - context: oa_admin
            name: oa-admin
          - context: oa_domes
            name: oa-domes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 阶段 4: 部署到服务器（仅在 Docker 推送成功后）
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/oa' }}

            # 拉取最新 docker-compose 配置
            git pull origin main --ff-only || echo "Not a git repo, skipping pull"

            # 登录 Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 拉取最新镜像
            docker compose pull

            # 重启服务
            docker compose up -d --remove-orphans

            # 清理旧镜像
            docker image prune -af --filter "until=24h"

            echo "✅ Deploy completed!"
